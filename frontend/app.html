<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AItodo</title>
    <link rel="stylesheet" href="css/app.css" />
    <script defer src="js/app.js"></script>
  </head>
  <body>
    <!-- 顶部栏 -->
    <div class="topbar">
      <div class="user-info">
        <span id="username">User</span>
      </div>
      <button id="logout-btn">退出</button>
    </div>

    <!-- 主内容 -->
    <div class="container">
      <h1>Todo List</h1>

      <div class="input-group">
        <input id="todo-input" placeholder="输入任务..." autocomplete="off" />
        <button class="btn--post">添加</button>
      </div>

      <div class="filters">
        <button id="filter-all">All</button>
        <button id="filter-active">Active</button>
        <button id="filter-completed">Completed</button>
      </div>

      <ol id="todo-list"></ol>

      <button class="btn--deleteCompleted">Clear Completed</button>
    </div>

    <div id="toast"></div>
  </body>
</html>
